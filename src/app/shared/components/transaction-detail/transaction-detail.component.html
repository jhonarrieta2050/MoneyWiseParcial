<ion-card *ngIf="transaccion">
  <ion-card-header>
    <div class="detail-header">
      <ion-icon [name]="transaccion.categoria | categoryIcon" [style.color]="transaccion.categoria | categoryColor" size="large"></ion-icon>
      <div>
        <ion-card-title>{{ transaccion.categoria }}</ion-card-title>
        <ion-card-subtitle>{{ transaccion.fecha | dateFormat }}</ion-card-subtitle>
      </div>
    </div>
  </ion-card-header>
  <ion-card-content>
    <div class="amount-section">
      <app-amount-display [monto]="transaccion.monto" [tipo]="transaccion.tipo"></app-amount-display>
    </div>
    <ion-list>
      <ion-item *ngIf="transaccion.descripcion">
        <ion-icon name="document-text" slot="start"></ion-icon>
        <ion-label>
          <h3>Descripción</h3>
          <p>{{ transaccion.descripcion }}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-icon name="pricetag" slot="start"></ion-icon>
        <ion-label>
          <h3>Tipo</h3>
          <p>{{ transaccion.tipo === 'ingreso' ? 'Ingreso' : 'Gasto' }}</p>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="transaccion.comprobante" button (click)="onViewPhotos()">
        <ion-icon name="image" slot="start"></ion-icon>
        <ion-label>Ver comprobante</ion-label>
        <ion-icon name="chevron-forward" slot="end"></ion-icon>
      </ion-item>
    </ion-list>
    <div class="action-buttons">
      <ion-button expand="block" fill="outline" (click)="onEdit()">
        <ion-icon name="create" slot="start"></ion-icon>
        Editar
      </ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="onDelete()">
        <ion-icon name="trash" slot="start"></ion-icon>
        Eliminar
      </ion-button>
    </div>
  </ion-card-content>
</ion-card>
