<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <ion-list>
    <ion-item>
      <ion-label position="stacked">Tipo *</ion-label>
      <ion-select formControlName="tipo" placeholder="Seleccionar tipo">
        <ion-select-option *ngFor="let tipo of tiposTransaccion" [value]="tipo.valor">{{ tipo.etiqueta }}</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Categoría *</ion-label>
      <ion-select formControlName="categoria" placeholder="Seleccionar categoría">
        <ion-select-option *ngFor="let cat of categorias" [value]="cat.nombre">{{ cat.nombre }}</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Monto *</ion-label>
      <ion-input formControlName="monto" type="number" placeholder="0"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Descripción</ion-label>
      <ion-input formControlName="descripcion" placeholder="Descripción opcional"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Fecha *</ion-label>
      <ion-datetime-button datetime="datetime"></ion-datetime-button>
      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime id="datetime" formControlName="fecha" presentation="date"></ion-datetime>
        </ng-template>
      </ion-modal>
    </ion-item>
  </ion-list>
  <div class="form-actions">
    <ion-button type="button" fill="outline" (click)="onTakePhoto()">
      <ion-icon name="camera" slot="start"></ion-icon>
      Agregar comprobante
    </ion-button>
    <ion-button type="submit" expand="block" [disabled]="form.invalid">
      {{ transaccion ? 'Actualizar' : 'Guardar' }}
    </ion-button>
  </div>
</form>
